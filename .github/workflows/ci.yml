name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
      - 'hotfix/**'
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: comanda
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d comanda"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/comanda?schema=test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/comanda?schema=test
      JWT_SECRET: test_jwt_secret_for_ci_and_local_min_32_chars
      PUBLIC_ORDER_JWT_SECRET: test_public_order_secret_for_ci_min_32_chars
      MERCADOPAGO_WEBHOOK_SECRET: test_webhook_secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      BRIDGE_TOKEN: test_bridge_token_123456
      FRONTEND_URL: http://127.0.0.1:5173
      BACKEND_URL: http://127.0.0.1:3001
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test -- --runInBand

  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: comanda
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d comanda"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/comanda?schema=test
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/comanda?schema=test
      JWT_SECRET: test_jwt_secret_for_ci_and_local_min_32_chars
      PUBLIC_ORDER_JWT_SECRET: test_public_order_secret_for_ci_min_32_chars
      MERCADOPAGO_WEBHOOK_SECRET: test_webhook_secret
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      BRIDGE_TOKEN: test_bridge_token_123456
      FRONTEND_URL: http://127.0.0.1:5173
      BACKEND_URL: http://127.0.0.1:3001
      SMOKE_ADMIN_EMAIL: admin.e2e@comanda.local
      SMOKE_ADMIN_PASSWORD: e2e12345
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - run: npm ci --prefix backend
      - run: npm ci --prefix frontend
      - run: npm ci --prefix e2e

      - name: Prepare backend env for smoke
        run: |
          cat > backend/.env <<'EOF'
          NODE_ENV=test
          DATABASE_URL=postgresql://postgres:postgres@127.0.0.1:5432/comanda?schema=test
          DIRECT_URL=postgresql://postgres:postgres@127.0.0.1:5432/comanda?schema=test
          JWT_SECRET=test_jwt_secret_for_ci_and_local_min_32_chars
          PUBLIC_ORDER_JWT_SECRET=test_public_order_secret_for_ci_min_32_chars
          MERCADOPAGO_WEBHOOK_SECRET=test_webhook_secret
          ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          BRIDGE_TOKEN=test_bridge_token_123456
          FRONTEND_URL=http://127.0.0.1:5173
          BACKEND_URL=http://127.0.0.1:3001
          SMOKE_ADMIN_EMAIL=admin.e2e@comanda.local
          SMOKE_ADMIN_PASSWORD=e2e12345
          EOF

      - run: npm --prefix backend run db:generate
      - run: npm --prefix backend run db:deploy
      - run: npm --prefix e2e run test:smoke
