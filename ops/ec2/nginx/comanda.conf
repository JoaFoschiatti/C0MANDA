#
# Reemplazar `comanda.example.com` por el dominio real antes de instalar.
# Este archivo arranca con el certificado snakeoil del sistema para que
# `nginx -t` y `certbot --nginx` funcionen desde el primer bootstrap.
# En la primera emision, Certbot reemplaza estas rutas por las reales.
#

limit_req_zone $binary_remote_addr zone=comanda_login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=comanda_public_order:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=comanda_public_retry:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=comanda_webhook:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=comanda_api_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name comanda.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name comanda.example.com;

    root /opt/comanda/frontend/dist;
    index index.html;

    client_max_body_size 10m;

    ssl_certificate /etc/ssl/certs/ssl-cert-snakeoil.pem;
    ssl_certificate_key /etc/ssl/private/ssl-cert-snakeoil.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:ComandaSSL:10m;
    ssl_session_tickets off;
    limit_req_status 429;
    limit_conn_status 429;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /api/eventos {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        add_header X-Accel-Buffering no;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /api/ready {
        return 403;
    }

    location = /api/auth/login {
        limit_req zone=comanda_login burst=5 nodelay;
        limit_conn comanda_api_conn 10;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location = /api/publico/pedido {
        limit_req zone=comanda_public_order burst=10 nodelay;
        limit_conn comanda_api_conn 20;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location ~ ^/api/publico/pedido/[0-9]+/pagar$ {
        limit_req zone=comanda_public_retry burst=10 nodelay;
        limit_conn comanda_api_conn 20;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location = /api/pagos/webhook/mercadopago {
        limit_req zone=comanda_webhook burst=30 nodelay;
        limit_conn comanda_api_conn 20;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location ^~ /api/impresion/jobs/ {
        # Reemplazar/agregar estas reglas con las IPs publicas reales del bridge.
        allow 127.0.0.1;
        allow ::1;
        # allow 203.0.113.10;
        # allow 198.51.100.0/24;
        deny all;

        limit_conn comanda_api_conn 5;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location /api/ {
        limit_conn comanda_api_conn 30;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection "";
    }

    location /uploads/ {
        alias /opt/comanda/uploads/;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
